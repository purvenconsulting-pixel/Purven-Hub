<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LinkedIn Headline Generator | Purven Hub</title>
    <meta name="description" content="Stand out on LinkedIn with AI-generated headlines tailored to your industry and role. Best for professionals and job seekers.">
    <link rel="canonical" href="https://purvenhub.com/ai-linkedin-headlines/">
    <meta property="og:title" content="AI LinkedIn Headline Generator | Purven Hub">
    <meta property="og:description" content="Stand out on LinkedIn with AI-generated headlines tailored to your industry and role. Free tool at Purven Hub.">
    <meta property="og:url" content="https://purvenhub.com/ai-linkedin-headlines/">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LinkedIn Headline Generator</h1>
            <p>Go beyond a job title. Create a headline that stops the scroll.</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="apiKey">OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="role">Role & Industry</label>
                <input type="text" id="role" placeholder="e.g., Marketing Director in SaaS">
            </div>
            <div class="form-group">
                <label for="audience">Target Audience</label>
                <input type="text" id="audience" placeholder="e.g., Hiring managers or SMB owners">
            </div>
            <button id="generateBtn" class="btn">Generate Headlines</button>
        </div>

        <div id="result-section" class="result-area">
            <label>Headline Variations</label>
            <div id="results"></div>
        </div>

        <footer>
            <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com" style="color: inherit;">Purven Consulting</a>.</p>
            <p><a href="/" style="color: #2563eb;">Home</a> | <a href="/ai-tools/" style="color: #2563eb;">Browse All Tools</a></p>
        </footer>
    </div>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const role = document.getElementById('role').value;
            const audience = document.getElementById('audience').value;
            
            if (!apiKey || !role || !audience) {
                alert('Please fill in all fields.');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerText = 'Creating...';

            const prompt = `Generate 5 high-converting LinkedIn headlines for someone in ${role} targeting ${audience}.
            Requirements:
            - Under 220 characters each.
            - Professional yet engaging.
            - Focus on hooks, achievements, or unique value propositions.
            Format as a plain list without numbers or dashes.`;

            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Generate Headlines';
            }
        };
    </script>
</body>
</html>
