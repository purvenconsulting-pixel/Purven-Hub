<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Headlines | Purven Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="radial-glow"></div>
    <nav>
        <div class="nav-container">
            <a href="../" class="logo">Purven Hub</a>
            <div class="nav-links">
                <a href="/ai-tools/">All Tools</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"></svg></button>
            </div>
        </div>
    </nav>

    <div class="tool-page-container">
        <div class="tool-header">
            <div class="eyebrow">CAREER TOOL</div>
            <h1>LinkedIn Headlines</h1>
            <p class="hero-sub">Stand out in the feed with professional headlines that showcase your unique value proposition.</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Current Role & Industry</label>
                <input type="text" id="role" placeholder="e.g., Marketing Director in SaaS">
            </div>
            <div class="form-group">
                <label>Target Audience / Focus</label>
                <input type="text" id="audience" placeholder="e.g., SMB owners or tech recruiters">
            </div>
            <button id="generateBtn" class="btn btn-primary btn-block">Generate Headlines</button>
        </div>

        <div id="results-container" class="results-container">
            <div class="form-group"><label>Headline Variations</label></div>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com">Purven Consulting</a>.</p>
        <p style="margin-top: 1rem;"><a href="../">Home</a> | <a href="/ai-tools/">All Tools</a></p>
    </footer>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const role = document.getElementById('role').value;
            const audience = document.getElementById('audience').value;
            if (!apiKey || !role) { alert('Role and API Key are required.'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Creating...';
            const prompt = `Generate 5 high-converting LinkedIn headlines for: Role: ${role}, Target: ${audience}. Under 220 chars.`;
            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = 'Generate Headlines'; }
        };
    </script>
</body>
</html>
