<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Generator | Purven Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="radial-glow"></div>
    <nav>
        <div class="nav-container">
            <a href="../" class="logo">Purven Hub</a>
            <div class="nav-links">
                <a href="/ai-tools/">All Tools</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"></svg></button>
            </div>
        </div>
    </nav>

    <div class="tool-page-container">
        <div class="tool-header">
            <div class="eyebrow">SOCIAL MEDIA</div>
            <h1>Tweet Generator</h1>
            <p class="hero-sub">Twitter (X) content without the writer's block. Perfect for building personal brands and authority.</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Topic / Input Text</label>
                <textarea id="topic" rows="3" placeholder="e.g., Tips for successful remote work..."></textarea>
            </div>
            <div class="form-group">
                <label>Tone</label>
                <select id="tone">
                    <option value="professional">Professional</option>
                    <option value="casual">Casual</option>
                    <option value="witty">Witty</option>
                    <option value="inspirational">Inspirational</option>
                </select>
            </div>
            <button id="generateBtn" class="btn btn-primary btn-block">Generate Tweets</button>
        </div>

        <div id="results-container" class="results-container">
            <div class="form-group"><label>Suggested Tweets</label></div>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com">Purven Consulting</a>.</p>
        <p style="margin-top: 1rem;"><a href="../">Home</a> | <a href="/ai-tools/">All Tools</a></p>
    </footer>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const topic = document.getElementById('topic').value;
            const tone = document.getElementById('tone').value;
            if (!apiKey || !topic) { alert('Required fields.'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Writing...';
            const prompt = `Generate 5 engaging tweets in ${tone} tone about: ${topic}. Under 280 chars.`;
            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = 'Generate Tweets'; }
        };
    </script>
</body>
</html>
