<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tweet Generator | Purven Hub</title>
    <meta name="description" content="Create viral tweets and threads in seconds. Choose your tone and let AI handle the creative writing for X.">
    <link rel="canonical" href="https://purvenhub.com/ai-tweet-generator/">
    <meta property="og:title" content="AI Tweet Generator | Purven Hub">
    <meta property="og:description" content="Generate catchy tweets in any tone. Free social media tool at Purven Hub.">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Tweet Generator</h1>
            <p>Twitter (X) content without the writer's block.</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="apiKey">OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="topic">About What?</label>
                <input type="text" id="topic" placeholder="e.g., The importance of deep work">
            </div>
            <div class="form-group">
                <label for="tone">Tone of Voice</label>
                <select id="tone">
                    <option value="professional">Professional</option>
                    <option value="casual">Casual</option>
                    <option value="witty">Witty</option>
                    <option value="inspirational">Inspirational</option>
                </select>
            </div>
            <button id="generateBtn" class="btn">Generate Tweets</button>
        </div>

        <div id="result-section" class="result-area">
            <label>Suggested Tweets</label>
            <div id="results"></div>
        </div>

        <footer>
            <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com" style="color: inherit;">Purven Consulting</a>.</p>
            <p><a href="/" style="color: #2563eb;">Home</a> | <a href="/ai-tools/" style="color: #2563eb;">Browse All Tools</a></p>
        </footer>
    </div>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const topic = document.getElementById('topic').value;
            const tone = document.getElementById('tone').value;
            
            if (!apiKey || !topic) {
                alert('Topic and API Key are required.');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerText = 'Writing...';

            const prompt = `Generate 5 engaging tweets about "${topic}" in a ${tone} tone.
            Requirements:
            - Each tweet must be under 280 characters.
            - Include relevant hashtags sparingly.
            - Focus on engagement (replies, RTs).
            Format as a plain list without numbers or dashes. Separated by new lines.`;

            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Generate Tweets';
            }
        };
    </script>
</body>
</html>
