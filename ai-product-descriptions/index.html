<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Description Generator | Purven Hub</title>
    <meta name="description" content="Generate persuasive, high-converting product descriptions and marketing taglines with AI. Free eCommerce tool.">
    <link rel="canonical" href="https://purvenhub.com/ai-product-descriptions/">
    <meta property="og:title" content="AI Product Description Generator | Purven Hub">
    <meta property="og:description" content="Persuasive product descriptions in seconds. Free at Purven Hub.">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Product Description Generator</h1>
            <p>Turn product features into compelling copy that sells.</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="apiKey">OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" placeholder="e.g., Ultra-light Ergo Chair">
            </div>
            <div class="form-group">
                <label for="features">Key Features (one per line)</label>
                <textarea id="features" rows="3" placeholder="e.g., Recycled materials\n10-year warranty\nLumbar support"></textarea>
            </div>
            <div class="form-group">
                <label for="customer">Target Customer</label>
                <input type="text" id="customer" placeholder="e.g., Remote office workers">
            </div>
            <button id="generateBtn" class="btn">Generate Copy</button>
        </div>

        <div id="result-section" class="result-area">
            <label>Product Description & Taglines</label>
            <div id="results"></div>
        </div>

        <footer>
            <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com" style="color: inherit;">Purven Consulting</a>.</p>
            <p><a href="/" style="color: #2563eb;">Home</a> | <a href="/ai-tools/" style="color: #2563eb;">Browse All Tools</a></p>
        </footer>
    </div>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const name = document.getElementById('name').value;
            const features = document.getElementById('features').value;
            const customer = document.getElementById('customer').value;
            
            if (!apiKey || !name || !features) {
                alert('Please fill in the required fields.');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerText = 'Analyzing features...';

            const prompt = `Write a polished product description (approx 100 words) and 3 short marketing taglines for "${name}".
            Features: ${features}
            Target Customer: ${customer}
            
            Requirements:
            - Professional, persuasive tone.
            - Emotional benefits, not just features.
            Format description first, then taglines on separate new lines.`;

            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Generate Copy';
            }
        };
    </script>
</body>
</html>
