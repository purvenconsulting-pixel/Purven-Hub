<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Descriptions | Purven Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="radial-glow"></div>
    <nav>
        <div class="nav-container">
            <a href="../" class="logo">Purven Hub</a>
            <div class="nav-links">
                <a href="/ai-tools/">All Tools</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"></svg></button>
            </div>
        </div>
    </nav>

    <div class="tool-page-container">
        <div class="tool-header">
            <div class="eyebrow">ECOMMERCE</div>
            <h1>Product Descriptions</h1>
            <p class="hero-sub">Persuasive, sales-driven copy for your products. Includes snappy taglines for headlines.</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" placeholder="e.g., UltraComfort Ergo Highback">
            </div>
            <div class="form-group">
                <label>Features (bullet points)</label>
                <textarea id="features" rows="3" placeholder="e.g., Lumbar support, Eco-friendly fabric..."></textarea>
            </div>
            <button id="generateBtn" class="btn btn-primary btn-block">Generate Description</button>
        </div>

        <div id="results-container" class="results-container">
            <div class="form-group"><label>Generated Copy</label></div>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com">Purven Consulting</a>.</p>
        <p style="margin-top: 1rem;"><a href="../">Home</a> | <a href="/ai-tools/">All Tools</a></p>
    </footer>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const name = document.getElementById('name').value;
            const features = document.getElementById('features').value;
            if (!apiKey || !name) { alert('Name and Key required.'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Creating copy...';
            const prompt = `Write a persuasive product description and 3 taglines for: Product: ${name}, Features: ${features}`;
            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = 'Generate Description'; }
        };
    </script>
</body>
</html>
