<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Bullet Generator | Purven Hub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="radial-glow"></div>
    <nav>
        <div class="nav-container">
            <a href="../" class="logo">Purven Hub</a>
            <div class="nav-links">
                <a href="/ai-tools/">All Tools</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"></svg></button>
            </div>
        </div>
    </nav>

    <div class="tool-page-container">
        <div class="tool-header">
            <div class="eyebrow">CAREER TOOL</div>
            <h1>Resume Bullets</h1>
            <p class="hero-sub">Generate high-impact, professional resume bullet points with AI. Transform your job responsibilities into achievements.</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Your key remains in your browser and is never stored.</p>
            </div>
            <div class="form-group">
                <label>Target Job Title</label>
                <input type="text" id="jobTitle" placeholder="e.g., Senior Project Manager">
            </div>
            <div class="form-group">
                <label>Draft Responsibilities</label>
                <textarea id="responsibilities" rows="4" placeholder="e.g., I led a team of 5 and managed the budget."></textarea>
            </div>
            <button id="generateBtn" class="btn btn-primary btn-block">Generate Power Bullets</button>
        </div>

        <div id="results-container" class="results-container">
            <div class="form-group"><label>Optimized Achievements</label></div>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Purven Hub. Part of <a href="https://purvenconsulting.com">Purven Consulting</a>.</p>
        <p style="margin-top: 1rem;"><a href="../">Home</a> | <a href="/ai-tools/">All Tools</a></p>
    </footer>

    <script src="../tool-logic.js"></script>
    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const apiKey = document.getElementById('apiKey').value;
            const jobTitle = document.getElementById('jobTitle').value;
            const responsibilities = document.getElementById('responsibilities').value;
            if (!apiKey || !jobTitle || !responsibilities) { alert('All fields are required.'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Crafting...';
            const prompt = `Rewrite these for a "${jobTitle}" into 5 high-impact resume bullet points with action verbs and metrics: ${responsibilities}`;
            try {
                const result = await callOpenAI(prompt, apiKey);
                showResults(result, 'results');
            } catch (err) { alert(err.message); } finally { btn.disabled = false; btn.innerText = 'Generate Power Bullets'; }
        };
    </script>
</body>
</html>
